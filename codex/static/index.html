<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>짐핏</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar glass">
        <div>
          <p class="eyebrow">짐핏</p>
          <strong class="brand-title">GymFit</strong>
        </div>
        <nav class="topbar-actions">
          <button class="nav-chip active" data-page-target="home" hx-get="/ui/page/home" hx-target="#page-shell" hx-swap="innerHTML">홈</button>
          <button class="nav-chip" data-page-target="planner" hx-get="/ui/page/planner" hx-target="#page-shell" hx-swap="innerHTML">루틴</button>
          <button class="nav-chip" data-page-target="atlas" hx-get="/ui/page/atlas" hx-target="#page-shell" hx-swap="innerHTML">도감</button>
          <button class="nav-chip" data-page-target="logger" hx-get="/ui/page/logger" hx-target="#page-shell" hx-swap="innerHTML">기록</button>
          <button class="nav-chip" data-page-target="progress" hx-get="/ui/page/progress" hx-target="#page-shell" hx-swap="innerHTML">성장</button>
        </nav>
      </header>

      <main id="page-shell" hx-get="/ui/page/home" hx-trigger="load" hx-swap="innerHTML">
        <section class="panel glass loading-panel">
          <p class="muted">짐핏 화면을 불러오는 중입니다.</p>
        </section>
      </main>
    </div>
  </body>
</html>
